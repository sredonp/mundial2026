<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fase Final Mundial 2026</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: #0f0f12;
  color: #f1f1f4;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  font-size: 2rem;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
  text-align: center;
}

.subtitle {
  color: #a0a0b0;
  margin-bottom: 4px;
  font-size: 0.95rem;
  text-align: center;
}

.note {
  color: #6a6a7e;
  margin-bottom: 16px;
  font-size: 0.78rem;
  text-align: center;
  max-width: 720px;
}

.status-bar {
  display: flex;
  justify-content: center;
  gap: 24px;
  font-size: 0.82rem;
  color: #8a8a9e;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.status-item { display:flex; align-items:center; gap:7px; }
.dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.dot.loading { background:#fbbf24; animation:pulse 1.5s infinite; }
.dot.ok      { background:#4ade80; }
.dot.err     { background:#ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── wrapper ── */
.bracket-wrapper {
  width:100%;
  max-width:2100px;
  overflow-x:auto;
  padding:10px 0 30px;
}

.bracket {
  display:grid;
  grid-template-columns: repeat(9, minmax(172px,1fr));
  gap:12px;
  min-width:1580px;
  padding:0 8px;
}

/* ── columns ── */
.col {
  display:flex;
  flex-direction:column;
  justify-content:space-around;
}

.col-title {
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#e5a93b;
  text-align:center;
  margin-bottom:12px;
  font-weight:700;
  border-bottom:2px solid #2a2a35;
  padding-bottom:4px;
}

/* ── cards ── */
.card {
  background:#1a1a24;
  border:1px solid #2e2e3e;
  border-radius:8px;
  padding:9px 10px;
  margin:8px 0;
  transition:all .25s ease;
}
.card:hover { border-color:#e5a93b; transform:translateY(-2px); box-shadow:0 6px 14px rgba(229,169,59,.15); }
.card.done  { border-color:#4ade80; }

.card-header {
  font-size:.68rem;
  color:#8a8a9e;
  margin-bottom:7px;
  border-bottom:1px solid #2a2a35;
  padding-bottom:3px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.t-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
  font-size:.86rem;
}

.t-info { display:flex; align-items:center; overflow:hidden; flex:1; }

.flag {
  width:24px; height:18px;
  border-radius:2px;
  margin-right:7px;
  object-fit:cover;
  flex-shrink:0;
}
.flag-ph { width:24px; height:18px; border-radius:2px; margin-right:7px; background:#2a2a35; border:1px dashed #444; flex-shrink:0; }

.t-name {
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:112px;
}
.t-name.pending { color:#8a8a9e; font-style:italic; }

.score {
  font-weight:700;
  color:#e5a93b;
  background:#252535;
  padding:2px 7px;
  border-radius:4px;
  min-width:22px;
  text-align:center;
  flex-shrink:0;
  margin-left:5px;
  font-size:.85rem;
}
.score.live { color:#4ade80; }

.card-footer {
  font-size:.65rem;
  color:#6a6a7e;
  margin-top:5px;
  text-align:right;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ── center ── */
.col-center {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.trophy { font-size:3.6rem; animation:float 3s ease-in-out infinite; margin-bottom:10px; }
@keyframes float { 0%{transform:translateY(0)} 50%{transform:translateY(-9px)} 100%{transform:translateY(0)} }

.final-wrap {
  background:linear-gradient(135deg,#2e2413,#1a1a24);
  border:2px solid #e5a93b;
  border-radius:12px;
  padding:14px;
  width:205px;
  box-shadow:0 0 22px rgba(229,169,59,.2);
}

.final-title {
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#e5a93b;
  font-weight:700;
  margin-bottom:8px;
}

.third-wrap { margin-top:20px; width:205px; }
.third-title { font-size:.72rem; color:#5c85d6; text-transform:uppercase; font-weight:700; margin-bottom:5px; }

.err-msg { color:#ef4444; text-align:center; padding:40px; grid-column:1/-1; }
</style>
</head>
<body>

<h1>Fase Final del Mundial 2026</h1>
<div class="subtitle">Datos en tiempo real · <strong>worldcup26.ir</strong> · Horario Colombia (UTC-5)</div>
<div class="note">
  Los equipos de R32 ya están resueltos desde el JSON. Los cruces de R16 en adelante
  se actualizan automáticamente cuando se conozcan los ganadores.
</div>

<div class="status-bar">
  <div class="status-item">
    <span class="dot loading" id="dot"></span>
    <span id="st">Cargando…</span>
  </div>
  <div class="status-item"><span id="upd">Última actualización: —</span></div>
</div>

<div class="bracket-wrapper">
  <div class="bracket" id="bracket">
    <div class="err-msg" style="color:#8a8a9e">Cargando bracket…</div>
  </div>
</div>

<script>
const PROXY = "https://script.google.com/macros/s/AKfycby9V6YTOZcWTUD9NtmlFhgJTuIjkdREBGEfyrjSy8FLRvWrARBJn68JKTjVfzmLClkIEA/exec";

// ── Banderas ──────────────────────────────────────────────
const FLAGS = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Korea Republic':'kr',
  'Czech Republic':'cz','Czechia':'cz',
  'Switzerland':'ch','Canada':'ca','Bosnia and Herzegovina':'ba','Bosnia':'ba','Qatar':'qa',
  'Brazil':'br','Morocco':'ma','Scotland':'gb-sct','Haiti':'ht',
  'United States':'us','USA':'us','Australia':'au','Paraguay':'py',
  'Turkey':'tr','Türkiye':'tr',
  'Germany':'de','Ivory Coast':'ci',"Côte d'Ivoire":'ci','Ecuador':'ec',
  'Curaçao':'cw','Curacao':'cw',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
  'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
  'Spain':'es','Cape Verde':'cv','Uruguay':'uy','Saudi Arabia':'sa',
  'France':'fr','Norway':'no','Senegal':'sn','Iraq':'iq',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Democratic Republic of the Congo':'cd',
  'Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa',
};

// ── Estadios ─────────────────────────────────────────────
const STAD = {
  1:'AT&T (Dallas)',2:"Levi's (SF)",3:'Rose Bowl (LA)',4:'SoFi (LA)',
  5:'Hard Rock (Miami)',6:'MetLife (NY/NJ)',7:'Arrowhead (KC)',
  8:'Lincoln Financial (Philly)',9:'Lumen Field (Seattle)',
  10:'Gillette (Boston)',11:'Empower (Denver)',12:'Azteca (CDMX)',
  13:'BC Place (Vancouver)',14:'Mercedes-Benz (Atlanta)',
  15:'NRG (Houston)',16:'Q2 (Austin)',
};

// ── Fecha a Colombia UTC-5 ────────────────────────────────
const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const pad   = n => String(n).padStart(2,'0');

function fmtDate(s) {
  if (!s) return '';
  const [dp, tp] = s.split(' ');
  const [mo,dd,yy] = dp.split('/');
  const d = new Date(`${yy}-${mo}-${dd}T${tp}:00-05:00`);
  return `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} · ${pad(d.getHours())}:${pad(d.getMinutes())}h`;
}

// ── Resolver label cuando no hay nombre directo ───────────
// Para R32 el JSON ya tiene home_team_name_en / away_team_name_en resueltos.
// Para R16+ solo tenemos labels tipo "Winner Match 74".
function resolveLabel(g, side) {
  const id  = side === 'h' ? g.home_team_id  : g.away_team_id;
  const nm  = side === 'h' ? g.home_team_name_en : g.away_team_name_en;
  const lbl = side === 'h' ? g.home_team_label   : g.away_team_label;

  // Si hay nombre real y el id no es 0, úsalo
  if (id && id !== '0' && nm) return nm;

  // Traducir labels al español
  if (!lbl) return '–';
  let m;
  m = lbl.match(/^Winner Group ([A-L])$/);
  if (m) return `1.° Grupo ${m[1]}`;
  m = lbl.match(/^Runner-up Group ([A-L])$/);
  if (m) return `2.° Grupo ${m[1]}`;
  m = lbl.match(/^3rd Group ([A-L/]+)$/);
  if (m) return `Mejor 3.° (${m[1]})`;
  m = lbl.match(/^Winner Match (\d+)$/);
  if (m) return `Gan. #${m[1]}`;
  m = lbl.match(/^Loser Match (\d+)$/);
  if (m) return `Per. #${m[1]}`;
  return lbl;
}

function isPending(name) {
  return !name || name.startsWith('Gan.') || name.startsWith('Per.')
    || name.startsWith('1.°') || name.startsWith('2.°')
    || name.startsWith('Mejor');
}

// ── HTML de una fila de equipo ────────────────────────────
function tRow(name, score, done) {
  const pend = isPending(name);
  const flagCode = FLAGS[name];
  const flagHtml = (!pend && flagCode)
    ? `<img src="https://flagcdn.com/24x18/${flagCode}.png" alt="${name}" class="flag"
            onerror="this.outerHTML='<span class=\\'flag-ph\\'></span>'">`
    : `<span class="flag-ph"></span>`;
  const sc = (done && score !== null && score !== undefined && score !== 'null')
    ? `<span class="score live">${score}</span>`
    : `<span class="score">–</span>`;
  return `<div class="t-row">
    <div class="t-info">
      ${flagHtml}
      <span class="t-name ${pend?'pending':''}">${name || '–'}</span>
    </div>${sc}</div>`;
}

// ── HTML de una match card ────────────────────────────────
function mkCard(g) {
  if (!g) return '<div class="card" style="opacity:.25"><div class="card-header">–</div></div>';
  const done = g.finished === 'TRUE';
  const h = resolveLabel(g,'h');
  const a = resolveLabel(g,'a');
  const st = STAD[parseInt(g.stadium_id)] || `Est. ${g.stadium_id}`;
  return `<div class="card ${done?'done':''}">
    <div class="card-header">#${g.id} · ${fmtDate(g.local_date)}</div>
    ${tRow(h, g.home_score, done)}
    ${tRow(a, g.away_score, done)}
    <div class="card-footer">${st}</div>
  </div>`;
}

function col(title, cards, center=false) {
  return `<div class="col ${center?'col-center':''}">
    <div class="col-title">${title}</div>
    ${cards}
  </div>`;
}

// ── Construcción del bracket ──────────────────────────────
//
//  Árbol real (verificado con el JSON de worldcup26.ir):
//
//  SF101 ← QF97  (W89 vs W90)   SF101 ← QF98  (W93 vs W94)
//  SF102 ← QF99  (W91 vs W92)   SF102 ← QF100 (W95 vs W96)
//
//  QF97: R16-89 (W74,W77)  +  R16-90 (W73,W75)
//  QF98: R16-93 (W83,W84)  +  R16-94 (W81,W82)
//  QF99: R16-91 (W76,W78)  +  R16-92 (W79,W80)
//  QF100:R16-95 (W86,W88)  +  R16-96 (W85,W87)
//
//  R16-89 ← R32: 74,77
//  R16-90 ← R32: 73,75
//  R16-93 ← R32: 83,84
//  R16-94 ← R32: 81,82
//  R16-91 ← R32: 76,78
//  R16-92 ← R32: 79,80
//  R16-95 ← R32: 86,88
//  R16-96 ← R32: 85,87
//
//  Distribución visual (izq→centro←der):
//  Col1 R32-L: 74,77,73,75,83,84,81,82
//  Col2 R16-L: 89,90,93,94
//  Col3 QF-L:  97,98
//  Col4 SF-L:  101
//  Col5 FINAL: 104 + 103
//  Col6 SF-R:  102
//  Col7 QF-R:  99,100
//  Col8 R16-R: 91,92,95,96
//  Col9 R32-R: 76,78,79,80,86,88,85,87

const R32L = [74,77,73,75,83,84,81,82];
const R16L = [89,90,93,94];
const QFL  = [97,98];

const R32R = [76,78,79,80,86,88,85,87];
const R16R = [91,92,95,96];
const QFR  = [99,100];

function buildBracket(games) {
  const byId = {};
  games.forEach(g => { byId[String(g.id)] = g; });

  const g = id => byId[String(id)];

  const centerHtml = `
    <div class="col col-center">
      <div class="trophy">🏆</div>
      <div class="final-wrap">
        <div class="final-title">Gran Final</div>
        ${mkCard(g(104))}
      </div>
      <div class="third-wrap">
        <div class="third-title">Tercer Puesto</div>
        ${mkCard(g(103))}
      </div>
    </div>`;

  return [
    col('1/16 de Final', R32L.map(id=>mkCard(g(id))).join('')),
    col('Octavos',       R16L.map(id=>mkCard(g(id))).join('')),
    col('Cuartos',       QFL .map(id=>mkCard(g(id))).join('')),
    col('Semifinal',     mkCard(g(101))),
    centerHtml,
    col('Semifinal',     mkCard(g(102))),
    col('Cuartos',       QFR .map(id=>mkCard(g(id))).join('')),
    col('Octavos',       R16R.map(id=>mkCard(g(id))).join('')),
    col('1/16 de Final', R32R.map(id=>mkCard(g(id))).join('')),
  ].join('');
}

// ── Carga principal ───────────────────────────────────────
async function load() {
  document.getElementById('dot').className = 'dot loading';
  document.getElementById('st').textContent = 'Actualizando…';
  try {
    const res  = await fetch(`${PROXY}?proxy=games`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const games = Array.isArray(data) ? data : (data.games || []);
    if (!games.length) throw new Error('Sin partidos en la respuesta');

    document.getElementById('bracket').innerHTML = buildBracket(games);
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('st').textContent = `${games.length} partidos cargados ✓`;

    const now = new Date();
    document.getElementById('upd').textContent =
      `Última actualización: ${pad(now.getHours())}:${pad(now.getMinutes())}h`;
  } catch(e) {
    console.error(e);
    document.getElementById('bracket').innerHTML =
      `<div class="err-msg">❌ ${e.message}<br><small>Verifica que el Apps Script tenga ?proxy=games activo.</small></div>`;
    document.getElementById('dot').className = 'dot err';
    document.getElementById('st').textContent = 'Error al cargar';
  }
}

load();
setInterval(load, 120000);
</script>
</body>
</html>
